<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRAS — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a1628; --teal: #0d9488; --teal-light: #14b8a6;
      --gold: #f59e0b; --white: #ffffff; --gray: #64748b;
      --light: #f1f5f9; --error: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1628 0%, #0f2040 60%, #134e4a 100%);
      display: flex; align-items: center; justify-content: center; padding: 30px 20px;
    }
    .card {
      background: var(--white); border-radius: 20px;
      width: 100%; max-width: 480px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .card-top {
      background: linear-gradient(135deg, var(--navy), #0f2040);
      padding: 36px 40px 28px;
      position: relative; overflow: hidden;
    }
    .card-top::after {
      content: '';
      position: absolute; right: -60px; top: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(13,148,136,0.25) 0%, transparent 70%);
      border-radius: 50%;
    }
    .card-top h2 {
      font-family: 'Playfair Display', serif;
      color: var(--white); font-size: 28px; margin-bottom: 6px;
      position: relative; z-index: 1;
    }
    .card-top p { color: rgba(255,255,255,0.5); font-size: 14px; position: relative; z-index: 1; }
    .card-body { padding: 36px 40px; }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 7px; }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 13px 16px 13px 44px;
      border: 2px solid #e2e8f0; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--navy);
      background: var(--light); outline: none; transition: all 0.25s;
    }
    .input-wrap input:focus { border-color: var(--teal); background: var(--white); box-shadow: 0 0 0 4px rgba(13,148,136,0.1); }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--gray); pointer-events: none; }
    .error-msg { color: var(--error); font-size: 12px; margin-top: 5px; min-height: 15px; }

    .btn-primary {
      width: 100%; padding: 15px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--teal), #065f46);
      color: white; font-size: 15px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.3s;
      margin-top: 4px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(13,148,136,0.35); }
    .btn-secondary {
      width: 100%; padding: 13px; border: 2px solid #e2e8f0; border-radius: 10px;
      background: transparent; color: var(--navy); font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.3s; margin-top: 10px;
    }
    .btn-secondary:hover { border-color: var(--teal); color: var(--teal); }
    .btn-secondary a { text-decoration: none; color: inherit; display: block; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 18px 0; color: var(--gray); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top">
      <h2>Create Account</h2>
      <p>Join PRAS — Integrated Health Monitoring System</p>
    </div>
    <div class="card-body">
      <form id="signForm" onsubmit="submitHandler(event)" novalidate>
        <div class="row-2">
          <div class="form-group">
            <label>Email</label>
            <div class="input-wrap">
              <span class="input-icon">📧</span>
              <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="error-msg" id="emailErr"></div>
          </div>
          <div class="form-group">
            <label>Username</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="username" placeholder="Choose username">
            </div>
            <div class="error-msg" id="userErr"></div>
          </div>
        </div>
        <div class="row-2">
          <div class="form-group">
            <label>Phone Number</label>
            <div class="input-wrap">
              <span class="input-icon">📱</span>
              <input type="number" id="num" placeholder="+91 XXXXX XXXXX">
            </div>
            <div class="error-msg" id="numErr"></div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input type="password" id="pswrd" placeholder="Min. 6 characters">
            </div>
            <div class="error-msg" id="pwdErr"></div>
          </div>
        </div>
        <button class="btn-primary" type="submit">Create My Account →</button>
        <div class="divider">already have an account?</div>
        <button class="btn-secondary" type="button"><a href="index.html">Sign In Instead</a></button>
      </form>
    </div>
  </div>
  <script>
    function submitHandler(e) {
      e.preventDefault();
      const email = document.getElementById("email");
      const username = document.getElementById("username");
      const number = document.getElementById("num");
      const password = document.getElementById("pswrd");
      ["emailErr","userErr","numErr","pwdErr"].forEach(id => document.getElementById(id).textContent = "");
      let valid = true;
      if (!email.value.trim()) { document.getElementById("emailErr").textContent = "Email is required"; valid = false; }
      else if (!email.value.includes("@")) { document.getElementById("emailErr").textContent = "Enter valid email"; valid = false; }
      if (!username.value.trim()) { document.getElementById("userErr").textContent = "Username is required"; valid = false; }
      if (!number.value.trim()) { document.getElementById("numErr").textContent = "Number is required"; valid = false; }
      else if (number.value.length < 10) { document.getElementById("numErr").textContent = "Enter valid number"; valid = false; }
      if (!password.value.trim()) { document.getElementById("pwdErr").textContent = "Password is required"; valid = false; }
      else if (password.value.length < 6) { document.getElementById("pwdErr").textContent = "Min. 6 characters"; valid = false; }
      if (!valid) return;
      let users = JSON.parse(localStorage.getItem("users")) || [];
      if (users.some(u => u.email === email.value || u.username === username.value)) {
        document.getElementById("userErr").textContent = "Account already exists. Please login"; return;
      }
      users.push({ email: email.value, username: username.value, number: number.value, password: password.value });
      localStorage.setItem("users", JSON.stringify(users));
      alert("Signup successful! Welcome to PRAS.");
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
